<div class="register-container">
  <div class="register-wrapper">
    <div class="register-side">
      <div class="side-content">
        <h2>Create Your Account</h2>
        <p>Join our enterprise platform and start managing your workflows efficiently.</p>
        <div class="side-features">
          <div class="feature">
            <span class="feature-icon">✓</span>
            <span>Secure authentication</span>
          </div>
          <div class="feature">
            <span class="feature-icon">✓</span>
            <span>Advanced job scheduling</span>
          </div>
          <div class="feature">
            <span class="feature-icon">✓</span>
            <span>Email automation</span>
          </div>
        </div>
      </div>
    </div>

    <div class="register-card">
      <div class="register-header">
        <h1>Sign Up</h1>
        <p>Get started in minutes</p>
      </div>
      
      <form class="register-form">
        <div class="form-row">
          <div class="form-group">
            <label for="firstname">First Name</label>
            <input 
              type="text" 
              id="firstname" 
              class="form-input" 
              placeholder="John"
              required
            />
          </div>
          <div class="form-group">
            <label for="lastname">Last Name</label>
            <input 
              type="text" 
              id="lastname" 
              class="form-input" 
              placeholder="Doe"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="john.doe@company.com"
            required
          />
        </div>

        <div class="form-group">
          <label for="company">Company</label>
          <input 
            type="text" 
            id="company" 
            class="form-input" 
            placeholder="Your Company"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            class="form-input" 
            placeholder="Create a strong password"
            required
          />
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input 
            type="password" 
            id="confirm-password" 
            class="form-input" 
            placeholder="Confirm password"
            required
          />
        </div>

        <div class="form-terms">
          <input type="checkbox" id="terms" required />
          <label for="terms">I agree to the <a href="#" class="link">Terms of Service</a></label>
        </div>

        <button type="submit" class="btn-primary">Create Account</button>

        <div class="form-footer">
          <span>Already have an account?</span>
          <a href="#" class="link">Sign in</a>
        </div>
      </form>
    </div>
  </div>
</div>
