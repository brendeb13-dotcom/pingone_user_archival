<div class="page-container">

  <!-- Header -->
  <div class="page-header">
    <div>
      <h1 class="page-title">All Users</h1>
      <p class="page-subtitle">
        Manage and view user records
      </p>
    </div>
    <div class="header-actions">
      <button type="button" pButton pRipple icon="pi pi-file-excel" (click)="dt.exportCSV()" class="btn-export" pTooltip="Export to CSV" tooltipPosition="bottom"></button>
      <button class="btn-primary" (click)="refresh()" [disabled]="loading()">
        🔃 Refresh
      </button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <p-table
      [columns]="tableColumns()"
      [value]="users()"
      [paginator]="true"
      [rows]="10"
      [rowsPerPageOptions]="[10, 25, 50]"
      [loading]="loading()"
      [autoLayout]="true"
      #dt
    >
      <ng-template pTemplate="header">
          <tr>
            <th *ngFor="let col of tableColumns()" [pSortableColumn]="col.field">
              <div class="flex flex-column gap-2">
                <div class="sort-header" (click)="$event.stopPropagation()">
                  <p-sortIcon [field]="col.field"></p-sortIcon>
                  <span>{{ col.header }}</span>
                </div>
                <input 
                  pInputText 
                  type="text" 
                  (input)="dt.filter($any($event.target).value, col.field, 'contains')" 
                  (click)="$event.stopPropagation()" 
                  [placeholder]="'Search ' + col.header" 
                  class="w-full column-filter">
              </div>
            </th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-user>
          <tr>
            <td *ngFor="let col of tableColumns()">
              {{ user[col.field] }}
            </td>
          </tr>
      </ng-template>
    </p-table>
  </div>

</div>
