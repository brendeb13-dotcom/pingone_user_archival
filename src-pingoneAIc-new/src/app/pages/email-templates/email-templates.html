<div class="page-container">
  <div class="page-header">
    <div class="header-content">
      <h1>Email Templates</h1>
      <p>Create and manage email templates for your communications</p>
    </div>
    <button class="btn-primary">+ New Template</button>
  </div>

  <div class="templates-container">
    <div class="templates-sidebar">
      <div class="search-box">
        <input type="text" placeholder="Search templates..." class="search-input" />
      </div>
      <div class="template-list">
        <div class="template-item active">
          <span class="template-icon">📧</span>
          <span>Welcome Email</span>
        </div>
        <div class="template-item">
          <span class="template-icon">✓</span>
          <span>Confirmation Email</span>
        </div>
        <div class="template-item">
          <span class="template-icon">⚠</span>
          <span>Alert Email</span>
        </div>
        <div class="template-item">
          <span class="template-icon">👋</span>
          <span>Offboarding Email</span>
        </div>
        <div class="template-item">
          <span class="template-icon">📋</span>
          <span>Report Email</span>
        </div>
      </div>
    </div>

    <div class="template-editor">
      <div class="editor-header">
        <h2>Welcome Email</h2>
        <div class="editor-actions">
          <button class="btn-secondary">Preview</button>
          <button class="btn-primary">Save</button>
        </div>
      </div>

      <div class="editor-form">
        <div class="form-group">
          <label>Template Name</label>
          <input type="text" class="form-input" value="Welcome Email" />
        </div>

        <div class="form-group">
          <label>Subject Line</label>
          <input type="text" class="form-input" value="Welcome to our platform!" />
        </div>

        <div class="form-group">
          <label>From Email</label>
          <input type="email" class="form-input" value="noreply@company.com" />
        </div>

        <div class="form-group">
          <label>Email Body</label>
          <textarea class="form-textarea" rows="12" placeholder="Enter your email content here..."></textarea>
        </div>

        <div class="form-group">
          <label>Variables</label>
          <div class="variables-list">
            <span class="variable-tag">{{firstName}}</span>
            <span class="variable-tag">{{lastName}}</span>
            <span class="variable-tag">{{email}}</span>
            <span class="variable-tag">{{company}}</span>
            <span class="variable-tag">{{joinDate}}</span>
          </div>
        </div>

        <div class="form-footer">
          <button class="btn-secondary">Discard</button>
          <button class="btn-primary">Save Template</button>
        </div>
      </div>
    </div>
  </div>
</div>
